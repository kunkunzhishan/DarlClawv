default_policy: safe-default
agent:
  default_id: default
  config_root: user/agents
engine:
  provider: codex-sdk
  model: gpt-5-codex
  timeout_ms: 120000
top_llm:
  api_key_env: OPENAI_API_KEY
  model: gpt-5-codex
  timeout_ms: 120000
memory:
  local_store_root: user/memory/agents
  global_vector_store_path: user/memory/global/group-vector.json
  vector:
    dimension: 96
    personal_recall_top_k: 6
    group_recall_top_k: 6
    compaction_similarity_threshold: 0.97
    max_records: 5000
    embedding:
      provider: deterministic
      base_url: https://open.bigmodel.cn/api/paas/v4
      model: embedding-3
      api_key_env: EMBEDDING_API_KEY
      timeout_ms: 20000
      fallback_to_deterministic: true
    splitter:
      enabled: true
      max_chars: 400
      overlap_chars: 60
      min_chunk_chars: 20
  temporary:
    promote_threshold: 24
    retain_after_promote: 12
    max_entries: 200
web:
  autostart: true
  host: 127.0.0.1
  port: 4789
workflow:
  max_self_iter_cycles: 6
  timeout_ms: 600000
security:
  default_admin_cap: full
  admin_stamp_path: src/config/security/admin-steel-stamp.md
